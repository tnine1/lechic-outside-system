<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Chic Café QR Menu</title>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<link rel="stylesheet" href="style.css">

<style>
/* Basic fallback styling if style.css fails */

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f5;
}

.container{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:600px;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
}

#status{
  text-align:center;
  margin-bottom:20px;
}

.menu-category{
  font-weight:bold;
  margin-top:15px;
  text-transform:capitalize;
}

.menu-item{
  padding:6px 0;
}

.spinner{
  margin:20px auto;
  border:4px solid #eee;
  border-top:4px solid #333;
  border-radius:50%;
  width:35px;
  height:35px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

#openPdf{
  margin-top:20px;
  padding:10px 15px;
  border:none;
  background:#333;
  color:white;
  border-radius:8px;
  cursor:pointer;
  width:100%;
}

#openPdf:hover{
  background:#111;
}

#pdfContainer{
  margin-top:20px;
  display:none;
}

#pdfContainer iframe{
  width:100%;
  height:600px;
  border:none;
}
</style>

</head>
<body>

<div class="container">
  <div class="card">

    <h1>☕ Le Chic Café</h1>

    <p id="status">Checking table and generating menu...</p>

    <div id="menu"></div>

    <div class="spinner"></div>

    <!-- PDF MENU BUTTON -->
    <button id="openPdf">📖 View Full Menu</button>

    <!-- PDF VIEWER -->
    <div id="pdfContainer">
      <iframe src="le chic menu.pdf"></iframe>
    </div>

  </div>
</div>

<!-- Notification sound -->
<audio id="notifySound">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

<script>
// Toggle PDF viewer
const openPdfBtn = document.getElementById("openPdf");
const pdfContainer = document.getElementById("pdfContainer");

openPdfBtn.addEventListener("click", () => {

  if(pdfContainer.style.display === "none"){
    pdfContainer.style.display = "block";
    openPdfBtn.textContent = "❌ Close Menu";
  }else{
    pdfContainer.style.display = "none";
    openPdfBtn.textContent = "📖 View Full Menu";
  }

});
</script>

</body>
</html>
