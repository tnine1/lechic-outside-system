<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Chic Café QR Menu</title>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<link rel="stylesheet" href="style.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f4f4;
padding:10px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 6px 25px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:10px;
font-size:26px;
}

#status{
text-align:center;
font-size:14px;
margin-bottom:15px;
color:#444;
}

.menu-category{
font-weight:bold;
margin-top:18px;
margin-bottom:5px;
font-size:16px;
text-transform:capitalize;
border-bottom:1px solid #eee;
padding-bottom:4px;
}

.menu-item{
padding:8px 0;
font-size:15px;
border-bottom:1px dashed #eee;
}

.spinner{
margin:20px auto;
border:4px solid #eee;
border-top:4px solid #333;
border-radius:50%;
width:32px;
height:32px;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

#openPdf{
margin-top:20px;
padding:14px;
border:none;
background:#111;
color:white;
border-radius:10px;
cursor:pointer;
font-size:16px;
width:100%;
}

#openPdf:active{
transform:scale(0.98);
}

#pdfContainer{
margin-top:15px;
display:none;
width:100%;
}

#pdfContainer iframe{
width:100%;
height:75vh;
border:none;
border-radius:10px;
}

/* mobile optimization */
@media (max-width:500px){

.card{
padding:15px;
}

h1{
font-size:22px;
}

.menu-item{
font-size:14px;
}

#openPdf{
font-size:15px;
padding:12px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>☕ Le Chic Café</h1>

<p id="status">Checking table and generating menu...</p>

<div id="menu"></div>

<div class="spinner"></div>

<button id="openPdf">📖 View Full Menu</button>

<div id="pdfContainer">
<iframe src="menu.pdf"></iframe>
</div>

</div>

</div>

<audio id="notifySound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

<script>

const openPdfBtn = document.getElementById("openPdf");
const pdfContainer = document.getElementById("pdfContainer");

openPdfBtn.addEventListener("click", () => {

if(pdfContainer.style.display === "none"){
pdfContainer.style.display = "block";
openPdfBtn.textContent = "❌ Close Menu";

pdfContainer.scrollIntoView({behavior:"smooth"});

}else{
pdfContainer.style.display = "none";
openPdfBtn.textContent = "📖 View Full Menu";
}

});

</script>

</body>
</html>
